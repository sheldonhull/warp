[tools]
"cargo:https://github.com/burtonageo/cargo-bundle" = "rev:ae4c76e92c08774bf54ff077b1c52e3d1cd6c16d"
gitleaks = "latest"
protoc = "latest"
trufflehog = "latest"

# One-time bootstrap. Idempotent — safe to re-run any time. Run after a fresh
# clone, after a macOS update that clears the system-managed Metal Toolchain,
# or whenever `mise run r` complains a prerequisite is missing.
#
#   1. Verifies xcode-select points at a full Xcode.app (Command Line Tools
#      alone don't ship the Metal shader compiler that crates/warpui needs).
#   2. Downloads the Metal Toolchain via xcodebuild — it's a separate
#      component from Xcode itself and gets cleared by some OS updates.
#   3. Creates the `Warp Dev` self-signed code-signing cert in the login
#      keychain (delegates to `cert:create`).
#   4. mise itself installs cargo-bundle + protoc on `mise install` (declared
#      under [tools] above).
[tasks.setup]
description = "One-time bootstrap: Xcode check, brew prereqs, Metal Toolchain, dev cert, claude-code-warp pointer instructions."
depends = ["cert:create"]
run = """
set -euo pipefail
[ "$(uname -s)" = "Darwin" ] || { echo "setup is macOS-only"; exit 0; }

DEV_DIR="$(xcode-select -p 2>/dev/null || true)"
if [ -z "$DEV_DIR" ] || [ "$DEV_DIR" = "/Library/Developer/CommandLineTools" ]; then
  echo "✗ xcode-select is pointed at Command Line Tools or unset." >&2
  echo "  Install Xcode.app from the App Store, then switch:" >&2
  echo "    open 'macappstore://itunes.apple.com/app/xcode/id497799835'" >&2
  echo "    sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer" >&2
  printf '  Open the App Store page for Xcode now? [y/N] ' >&2
  read -r ans
  case "$ans" in
    y|Y) open 'macappstore://itunes.apple.com/app/xcode/id497799835' ;;
  esac
  exit 1
fi
echo "✓ xcode-select: $DEV_DIR"

# ---- Homebrew prereqs (jq for plugin hooks; codesign already ships with macOS) ----
if ! command -v brew >/dev/null 2>&1; then
  echo "✗ Homebrew not installed." >&2
  echo "  Install: /bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\"" >&2
  exit 1
fi
echo "✓ brew: $(brew --prefix)"
for pkg in jq; do
  if brew list --formula "$pkg" >/dev/null 2>&1; then
    echo "✓ brew package: $pkg"
  else
    echo "→ installing brew package: $pkg"
    brew install "$pkg"
  fi
done

if xcrun --find metal >/dev/null 2>&1 && xcrun metal --version >/dev/null 2>&1; then
  echo "✓ Metal Toolchain present"
else
  echo "→ Downloading Metal Toolchain (~700 MB, idempotent)…"
  xcodebuild -downloadComponent MetalToolchain
fi

# ---- claude-code-warp plugin pointer (fork ref) ----
# Bazinga status-mapping hooks (PreToolUse AskUserQuestion, SessionEnd→cancelled,
# PostToolUseFailure→Error) live on sheldonhull/claude-code-warp's
# feat/improve-claude-status-mapping branch. Upstream warpdotdev/main lacks
# them, so the sidebar can't transition out of IDLE on those events when the
# stock plugin is loaded.
SETTINGS="$HOME/.claude/settings.json"
if [ -f "$SETTINGS" ]; then
  if grep -q '"sheldonhull/claude-code-warp"' "$SETTINGS"; then
    echo "✓ ~/.claude/settings.json already points at sheldonhull/claude-code-warp fork"
  else
    cat >&2 <<'HINT'
ℹ ~/.claude/settings.json does NOT point at the fork. To consume the bazinga
  status-mapping hooks, edit the file's extraKnownMarketplaces.claude-code-warp
  entry to:

    "claude-code-warp": {
      "source": {
        "source": "github",
        "repo": "sheldonhull/claude-code-warp",
        "ref": "feat/improve-claude-status-mapping"
      }
    }

  Then restart Claude Code (do NOT /reload-plugins — it strips the ref field).
  If you manage settings via chezmoi, edit the template instead.
HINT
  fi
else
  echo "ℹ ~/.claude/settings.json missing — install Claude Code first, then re-run setup." >&2
fi

echo "✓ setup complete. Run \\`mise run r\\` to build + launch WarpOss."
"""

# WarpBazinga dev rebuild loop. `mise run r` kills the running Warp build,
# rebuilds + bundles via `./script/run --dont-open`, re-signs the bundle with a
# stable dev cert so TCC grants survive rebuilds, then launches the freshly
# built bundle. The TERM override sidesteps the `Term(ColorOutOfRange)` panic
# that `cargo-bundle` hits under Claude Code's pty.
#
# Override the signing identity by setting `WARP_DEV_CERT` (defaults to
# `Scry Dev`). The cert must be in your login keychain, valid for code-signing,
# and have `/usr/bin/codesign` listed in its ACL so re-signs run silently.
[tasks.r]
description = "Rebuild + re-sign + relaunch WarpOss for the dev loop."
run = """
set -e
pkill -f WarpOss 2>/dev/null || true
pkill -f warp-oss 2>/dev/null || true
sleep 1
rm -f /tmp/claude/warp-run.log
mkdir -p /tmp/claude
TERM=xterm-256color NO_COLOR=1 WARP_COMMON_SKILLS_INSTALL_TARGET=project \\
  ./script/run --dont-open 2>&1 | tee /tmp/claude/warp-run.log | tail -3
APP="target/debug/bundle/osx/WarpOss.app"
CERT="${WARP_DEV_CERT:-Warp Dev}"
# Re-sign the bundle with a stable dev cert so the designated requirement
# pins to the cert leaf instead of the per-build cdhash. macOS TCC keys
# permission grants on the DR, so this keeps Accessibility / Screen Capture /
# Apple Events grants alive across rebuilds. Falls back to the upstream
# ad-hoc signature if the cert isn't available.
if security find-certificate -c "$CERT" >/dev/null 2>&1; then
  codesign --force --deep --sign "$CERT" --timestamp=none "$APP"
  DR=$(codesign -d -r- "$APP" 2>&1 | grep designated || true)
  case "$DR" in
    *'cdhash H"'*) echo "warn: DR still cdhash-pinned, TCC grants will reset" >&2 ;;
  esac
else
  echo "warn: cert '$CERT' missing in keychain; bundle stays ad-hoc signed" >&2
fi
# Detach launch from the terminal process tree via launchctl asuser. Without
# this, TCC attaches the Accessibility / Screen Capture grants to whatever
# parent process triggered the prompt (mise, Warp, Claude Code), so every new
# terminal session re-prompts even when the bundle's signature is stable.
launchctl asuser "$(id -u)" open -b dev.warp.WarpOss
"""

# One-time bootstrap: generate a self-signed `Warp Dev` cert in the login
# keychain if one doesn't exist. Imports as a PKCS12 bundle with a friendly
# name so the keychain prompt reads "Warp Dev" (instead of generic "key").
# Pre-grants `/usr/bin/codesign` ACL so the re-sign in `mise run r` runs
# without a keychain prompt. Set `WARP_DEV_CERT` to use a different identity.
[tasks."cert:create"]
description = "Create a self-signed code-signing cert for the dev rebuild loop."
run = """
set -euo pipefail
CERT="${WARP_DEV_CERT:-Warp Dev}"
LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"

# Treat an existing identity (cert + matching private key) as a no-op. A bare
# cert without a key isn't usable for signing — fall through to the recreate
# path in that case.
if security find-identity -p codesigning -v "$LOGIN_KEYCHAIN" 2>/dev/null \\
     | grep -F "$CERT" >/dev/null; then
  echo "✓ identity '$CERT' already in login keychain"
  exit 0
fi

# Clean up any stale half-imports left from a previous failed run so the new
# import doesn't trip 'errSecDuplicateItem' / 'errSecInternalComponent'.
security delete-identity -c "$CERT" "$LOGIN_KEYCHAIN" >/dev/null 2>&1 || true
security delete-certificate -c "$CERT" "$LOGIN_KEYCHAIN" >/dev/null 2>&1 || true

TMP=$(mktemp -d); trap 'rm -rf "$TMP"' EXIT
cat > "$TMP/cert.conf" << CONF
[req]
prompt             = no
distinguished_name = dn
x509_extensions    = v3_req
[dn]
CN = $CERT
[v3_req]
keyUsage             = critical, digitalSignature
extendedKeyUsage     = critical, codeSigning
basicConstraints     = critical, CA:FALSE
subjectKeyIdentifier = hash
CONF
openssl genrsa -out "$TMP/key.pem" 2048 2>/dev/null
openssl req -x509 -key "$TMP/key.pem" -sha256 -days 3650 \\
  -out "$TMP/cert.pem" -config "$TMP/cert.conf" 2>/dev/null

# Bundle into PKCS12 with -name so the keychain assigns a human label to the
# private key. Without this, the entry shows up as the unlabeled string "key"
# in the keychain access prompt — fine functionally, but confusing when
# multiple dev certs share the keychain. `-legacy` forces SHA1/3DES PBE+MAC
# algorithms; macOS Security framework rejects OpenSSL 3's default AES-256+
# SHA-256 PBE bundle with "MAC verification failed".
# Use macOS's system LibreSSL for the PKCS12 export — Homebrew's OpenSSL 3
# defaults to algorithms `security import` rejects with "MAC verification
# failed" even with `-legacy`. LibreSSL emits a bundle the keychain accepts.
/usr/bin/openssl pkcs12 -export \\
  -inkey "$TMP/key.pem" -in "$TMP/cert.pem" \\
  -name "$CERT" -passout pass:warpdev -out "$TMP/cert.p12"
security import "$TMP/cert.p12" -k "$LOGIN_KEYCHAIN" -P "warpdev" \\
  -T /usr/bin/codesign -T /usr/bin/security

echo "✓ created. First codesign run will prompt the keychain once for '$CERT' — click 'Always Allow'."
"""

# Remove the dev signing cert + private key from the login keychain. Useful
# when rotating, or to clean up half-imports from a failed `cert:create`.
[tasks."cert:reset"]
description = "Delete the dev signing cert + key from the login keychain."
run = """
set -euo pipefail
CERT="${WARP_DEV_CERT:-Warp Dev}"
LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
security delete-identity -c "$CERT" "$LOGIN_KEYCHAIN" >/dev/null 2>&1 || true
security delete-certificate -c "$CERT" "$LOGIN_KEYCHAIN" >/dev/null 2>&1 || true
echo "✓ removed '$CERT' from login keychain (if present)"
"""

# Drive the WarpBazinga sidebar through real OSC 777 `warp://cli-agent` events
# from inside a warp-oss tab. Run this in the tab whose sidebar row you want
# to inspect. The warp@claude-code-warp plugin emits these events during real
# Claude sessions; this task exercises each state without waiting for a real
# session to hit each transition.
#
# Bucket coverage (every CLIAgentSessionStatus reachable):
#   InProgress (RUNNING)  → running, tool_success
#   Success    (DONE)     → stop
#   Error      (FAILED)   → error
#   Cancelled             → cancelled
#   Blocked    (NEEDS ME) → blocked, question, perm_granted (transient)
#   (no-op)               → idle, start
#
# mise's `run = """..."""` invocation swallows args passed after `--` (the
# script runs under `sh -c` with no positional args), so the scenario name is
# passed via the SCENARIO env var.
#
# Per-state quick scenarios:
#   SCENARIO=start         mise run warp:test:sidebar    # (no status)
#   SCENARIO=running       mise run warp:test:sidebar    # → InProgress
#   SCENARIO=blocked       mise run warp:test:sidebar    # → Blocked (NEEDS ME)
#   SCENARIO=question      mise run warp:test:sidebar    # → Blocked (NEEDS ME)
#   SCENARIO=stop          mise run warp:test:sidebar    # → Success
#   SCENARIO=error         mise run warp:test:sidebar    # → Error
#   SCENARIO=cancelled     mise run warp:test:sidebar    # → Cancelled
#   SCENARIO=idle          mise run warp:test:sidebar    # → Idle (from Success/Cancelled; else no-op)
#
# Transition scenarios (Blocked → ?):
#   SCENARIO=perm_granted  mise run warp:test:sidebar    # blocked → tool_complete success:true → InProgress
#   SCENARIO=perm_replied  mise run warp:test:sidebar    # blocked → permission_replied → InProgress
#   SCENARIO=recover_error mise run warp:test:sidebar    # error → prompt_submit → InProgress
#
# Sequences:
#   mise run warp:test:sidebar                           # full walk (default)
#   SCENARIO=cycle         mise run warp:test:sidebar    # rapid cycle through all 5 statuses
#   SCENARIO=reset         mise run warp:test:sidebar    # clear current SID
#   SCENARIO=list          mise run warp:test:sidebar    # print scenarios + status mapping
#
# session_id is reused across runs via /tmp/claude/warp-osc-sid so consecutive
# scenarios apply to the same session. `reset` clears it.
[tasks."warp:test:sidebar"]
description = "Drive the bazinga sidebar through OSC 777 events for manual state testing."
run = """
set -u
SCENARIO="${SCENARIO:-${1:-full}}"
SID_FILE="/tmp/claude/warp-osc-sid"
mkdir -p /tmp/claude
SID="$(cat "$SID_FILE" 2>/dev/null || true)"
if [ -z "$SID" ]; then
  SID="manual-$$-$(date +%s)"
  echo "$SID" > "$SID_FILE"
fi
CWD="$PWD"
PLUG="warp-bazinga-dev-1"

emit() {
  local event="$1"; shift
  local extra=""
  while [ $# -gt 0 ]; do extra+=",$1"; shift; done
  local body
  body=$(jq -nc \\
    --argjson v 1 --arg agent "claude" --arg event "$event" \\
    --arg sid "$SID" --arg cwd "$CWD" --arg plug "$PLUG" \\
    "{v:\\$v, agent:\\$agent, event:\\$event, session_id:\\$sid, cwd:\\$cwd, plugin_version:\\$plug${extra:+, ${extra#,}}}")
  printf '\\033]777;notify;warp://cli-agent;%s\\a' "$body"
  echo "  → $event ($body)" >&2
}

case "$SCENARIO" in
  list)
    printf "%s\n" \
      "warp:test:sidebar scenarios - every CLIAgentSessionStatus reachable" \
      "" \
      "per-state:" \
      "  start         session_start                                  -> (no status)" \
      "  running       prompt_submit                                  -> InProgress" \
      "  blocked       permission_request                             -> Blocked (NEEDS ME)" \
      "  question      question_asked                                 -> Blocked (NEEDS ME)" \
      "  stop          stop                                           -> Success" \
      "  error         tool_complete success:false                    -> Error" \
      "  cancelled     cancelled                                      -> Cancelled" \
      "  idle          idle_prompt                                    -> Idle (from Success/Cancelled; else no-op)" \
      "" \
      "transitions:" \
      "  perm_granted  blocked -> tool_complete success:true          -> InProgress" \
      "  perm_replied  blocked -> permission_replied                  -> InProgress" \
      "  recover_error error   -> prompt_submit                       -> InProgress" \
      "" \
      "sequences:" \
      "  full          start->running->blocked->success" \
      "  cycle         InProgress->Blocked->Error->Cancelled->Success" \
      "  reset         clear SID file"
    ;;
  reset)
    emit stop response:'\"reset\"'
    rm -f "$SID_FILE"
    echo "↺ session reset (next run picks a fresh SID)" >&2
    ;;
  start)         emit session_start ;;
  running)       emit session_start; sleep 0.2; emit prompt_submit query:'\"streaming test\"' ;;
  blocked)       emit session_start; sleep 0.2; emit permission_request tool_name:'\"Bash\"' summary:'\"approve test command?\"' ;;
  question)      emit session_start; sleep 0.2; emit question_asked summary:'\"pick an option\"' ;;
  stop)          emit session_start; sleep 0.2; emit stop response:'\"manual stop\"' ;;
  error)         emit session_start; sleep 0.2; emit tool_complete tool_name:'\"Bash\"' summary:'\"failed\"' success:false ;;
  cancelled)     emit session_start; sleep 0.2; emit cancelled reason:'\"prompt_input_exit\"' ;;
  idle)
    # Idle only promotes from a terminal state (Success / Cancelled). Drive
    # the session through stop first so the follow-up idle_prompt actually
    # transitions to Idle instead of being a no-op against the default
    # InProgress that `session_start` registers.
    emit session_start
    sleep 0.2
    emit stop response:'\"setup for idle\"'
    sleep 0.2
    emit idle_prompt summary:'\"waiting for input\"'
    ;;
  perm_granted)
    emit session_start
    sleep 0.2
    emit permission_request tool_name:'\"Bash\"' summary:'\"approve ls -la?\"'
    echo "→ Blocked (NEEDS ME)" >&2
    sleep 2
    emit tool_complete tool_name:'\"Bash\"' success:true
    echo "→ InProgress (RUNNING) after grant" >&2
    ;;
  perm_replied)
    emit session_start
    sleep 0.2
    emit permission_request tool_name:'\"Bash\"' summary:'\"approve ls -la?\"'
    echo "→ Blocked (NEEDS ME)" >&2
    sleep 2
    emit permission_replied
    echo "→ InProgress (RUNNING) after reply" >&2
    ;;
  recover_error)
    emit session_start
    sleep 0.2
    emit tool_complete tool_name:'\"Bash\"' summary:'\"failed\"' success:false
    echo "→ Error (FAILED)" >&2
    sleep 2
    emit prompt_submit query:'\"retry\"'
    echo "→ InProgress (RUNNING) after retry prompt" >&2
    ;;
  cycle)
    emit session_start;        sleep 0.6
    emit prompt_submit query:'\"cycle start\"';                       echo "→ InProgress" >&2; sleep 1
    emit permission_request tool_name:'\"Bash\"' summary:'\"cycle\"'; echo "→ Blocked"    >&2; sleep 1
    emit tool_complete tool_name:'\"Bash\"' summary:'\"err\"' success:false; echo "→ Error" >&2; sleep 1
    emit cancelled reason:'\"prompt_input_exit\"';                    echo "→ Cancelled" >&2; sleep 1
    emit prompt_submit query:'\"resume\"';                            echo "→ InProgress" >&2; sleep 1
    emit stop response:'\"cycle done\"';                              echo "→ Success"    >&2
    ;;
  full|"")
    emit session_start
    sleep 1; echo "→ IDLE (no status yet); SID=$SID" >&2
    emit prompt_submit query:'\"full-sequence streaming\"'
    echo "→ RUNNING (blue)" >&2
    sleep 3
    emit permission_request tool_name:'\"Bash\"' summary:'\"approve full-sequence?\"'
    echo "→ NEEDS ME (orange)" >&2
    sleep 3
    emit stop response:'\"full sequence done\"'
    echo "→ SUCCESS (green) then IDLE" >&2
    ;;
  *)
    echo "unknown scenario: $SCENARIO" >&2
    echo "run: mise run warp:test:sidebar -- list" >&2
    exit 2
    ;;
esac
"""

# Capture a screenshot of display 2 (where WarpOss runs) and crop the sidebar
# region. Output: /tmp/claude/screens/iter.png + /tmp/claude/screens/iter-sidebar.png.
# Override the display with `mise run shot -- 1` for the built-in display.
[tasks.shot]
description = "Capture WarpOss screenshot + sidebar crop for the dev loop."
run = """
set -e
mkdir -p /tmp/claude/screens
# Probe available displays and capture each so the loop works whether the laptop is
# docked (2 displays) or on the road (built-in only). Pick the one most likely to
# have WarpOss by capturing all and reading them in order.
displays=$(system_profiler SPDisplaysDataType 2>/dev/null | grep -c "Resolution" || echo 1)
if [ "${displays:-1}" -ge 2 ]; then
  screencapture -D 2 -x -o -t png /tmp/claude/screens/iter.png
else
  screencapture -D 1 -x -o -t png /tmp/claude/screens/iter.png
fi
sips --cropToHeightWidth 1200 1000 --cropOffset 200 0 /tmp/claude/screens/iter.png --out /tmp/claude/screens/iter-sidebar.png >/dev/null
echo "Wrote /tmp/claude/screens/iter.png + /tmp/claude/screens/iter-sidebar.png"
"""
